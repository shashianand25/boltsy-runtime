name: PR Enforcer Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Adjust based on target repo stack

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

  ai-review-gate:
    name: AI Review Gate
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for diffing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      # This assumes the AI review script is available in the repo or injected by OpenClaw
      - name: Run AI PR Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running AI Review against business context..."
          # python scripts/ai_review_gate.py

  notify-telegram:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: ai-review-gate
    if: success() # Only run if lint, test, and AI review passed
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      # We trigger the telegram notification script
      - name: Send Merge-Ready Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python telegram_notifier.py
